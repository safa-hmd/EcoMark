framework:
    secret: '%env(APP_SECRET)%'
    
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native
        cookie_lifetime: 86400    # 24 heures
        gc_maxlifetime: 7200      # 30 minutes
        gc_probability: 1
        gc_divisor: 1000
    
    http_client:
        default_options:
            timeout: 60
            max_redirects: 3

when@dev:
    framework:
        router:
            strict_requirements: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file