security:
    # Password hashing
    password_hashers:
        App\Entity\User:
            algorithm: auto

    # User provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # Firewalls
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: _username
                password_parameter: _password
                enable_csrf: true
                default_target_path: /redirect_based_on_role

            logout:
                path: app_logout
                target: app_login
                invalidate_session: true

    # Access control (IMPORTANT: pas sous firewalls)
    access_control:
        # Public
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/inscription, roles: PUBLIC_ACCESS }

        # Admin
        - { path: ^/reponse/delete, roles: ROLE_ADMIN }
        - { path: ^/profilAdmin, roles: ROLE_ADMIN }

        # Vendeur
        - { path: ^/profilVendeur, roles: ROLE_VENDEUR }

        # Client
        - { path: ^/profil_client, roles: ROLE_CLIENT }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
